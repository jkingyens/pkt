<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Page - Wildcard</title>
    <style>
        :root {
            --bg: #f8fafc;
            --loading-bg: #ffffff;
            --loading-text: #64748b;
            --error-text: #ef4444;
        }

        body.dark-mode {
            --bg: #0f172a;
            --loading-bg: #1e293b;
            --loading-text: #94a3b8;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
        }
        #content-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--loading-bg);
            z-index: 1000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--loading-text);
        }
        #loading.hidden {
            display: none;
        }
        .error {
            color: var(--error-text);
            text-align: center;
            padding: 50px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
    </style>
    <script src="theme-init.js"></script>
</head>
<body>
    <div id="loading">Loading page...</div>
    <iframe id="content-frame" class="hidden"></iframe>

    <script src="../src/clipper.js"></script>
    <script src="viewer.js"></script>
</body>
</html>
