<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Microphone Permission Required</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --container-bg: white;
            --text: #333;
            --text-secondary: #666;
            --primary: #007bff;
            --primary-hover: #0056b3;
            --icon-color: #64748b;
        }

        body.dark-mode {
            --bg: #0f172a;
            --container-bg: #1e293b;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --icon-color: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            text-align: center;
        }

        .container {
            max-width: 400px;
            padding: 40px;
            background: var(--container-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.6;
            font-size: 15px;
        }

        button {
            padding: 12px 32px;
            font-size: 16px;
            font-weight: 600;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: rgba(100, 116, 139, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .icon-svg {
            width: 40px;
            height: 40px;
            color: var(--icon-color);
        }
    </style>
</head>

<body>
    <script src="theme-init.js"></script>
    <div class="container">
        <div class="icon-container">
            <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
            </svg>
        </div>
        <h1>Media Permissions</h1>
        <p>To record audio and video clips, Wildcard needs permission to access your microphone and camera. Please click the button below and
            select <strong>Allow</strong> in the browser prompt.</p>
        <button id="requestBtn">Grant Permissions</button>
    </div>
    <script src="permission.js"></script>
</body>

</html>
