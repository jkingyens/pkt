<!DOCTYPE html>
<html>

<head>
    <title>Microphone Permission Required</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --container-bg: white;
            --text: #333;
            --text-secondary: #666;
            --primary: #007bff;
            --primary-hover: #0056b3;
        }

        body.dark-mode {
            --bg: #0f172a;
            --container-bg: #1e293b;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            text-align: center;
        }

        .container {
            max-width: 400px;
            padding: 30px;
            background: var(--container-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <script src="theme-init.js"></script>
    <div class="container">
        <div class="icon">🎤</div>
        <h1>Microphone Permission</h1>
        <p>To record audio clips, Wildcard needs permission to access your microphone. Please click the button below and
            select <strong>Allow</strong> in the browser prompt.</p>
        <button id="requestBtn">Grant Permission</button>
    </div>
    <script src="permission.js"></script>
</body>

</html>
