<!DOCTYPE html>
<html>

<head>
    <style>
        :root {
            --island-bg: #000000;
            --island-text: white;
            --indicator-bg: #ff3b30;
            --record-fill: #ff453a;
            --stop-fill: white;
        }

        body.dark-mode {
            --island-bg: #000000; /* Keep black for "Island" look, or adjust as needed */
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: var(--island-bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--island-text);
            user-select: none;
        }

        .island {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 40px;
            padding: 0 16px;
            box-sizing: border-box;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--indicator-bg);
            display: none;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        button {
            border: none;
            background: none;
            padding: 0;
            cursor: pointer;
            line-height: 1;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.9);
        }

        #record-btn svg, #record-video-btn svg {
            fill: var(--record-fill);
            width: 24px;
            height: 24px;
        }

        #stop-btn {
            display: none;
        }

        #stop-btn svg {
            fill: var(--stop-fill);
            width: 20px;
            height: 20px;
        }
    </style>
</head>

<body>
    <script src="../sidebar/theme-init.js"></script>
    <div class="island">
        <div class="status">
            <div id="indicator" class="indicator"></div>
            <span id="timer">Wildcard</span>
        </div>
        <div class="controls">
            <button id="record-btn" title="Start Audio Recording">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="9" />
                </svg>
            </button>
            <button id="record-video-btn" title="Start Video Recording">
                <svg viewBox="0 0 24 24">
                    <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z" />
                </svg>
            </button>
            <button id="stop-btn" title="Stop Recording">
                <svg viewBox="0 0 24 24">
                    <rect x="6" y="6" width="12" height="12" rx="2" />
                </svg>
            </button>
        </div>
    </div>
    <script src="island.js"></script>
</body>

</html>
